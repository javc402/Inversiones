name: Deploy - Produccion y Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Inversiones

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build PRODUCCION (ruta raiz)
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > frontend/.env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> frontend/.env.production
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> frontend/.env.production
          cd frontend
          VITE_BASE_PATH=/Inversiones/ npm run build
          mkdir -p ../out
          cp -r dist/* ../out/

      - name: Build DESARROLLO (ruta /dev)
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL_DEV }}" > frontend/.env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY_DEV }}" >> frontend/.env.production
          echo "VITE_API_URL=${{ secrets.VITE_API_URL_DEV }}" >> frontend/.env.production
          cd frontend
          VITE_BASE_PATH=/Inversiones/dev/ npm run build
          mkdir -p ../out/dev
          cp -r dist/* ../out/dev/

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
