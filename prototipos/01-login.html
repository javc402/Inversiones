<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones - Login</title>
    <link rel="stylesheet" href="assets/css/paleta.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: var(--font-family-base);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100vh;
            background: white;
            box-shadow: var(--shadow-xl);
        }

        .login-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 120px;
        }

        .login-form-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-3xl);
        }

        .login-form-container {
            width: 100%;
            max-width: 420px;
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .login-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            border-radius: var(--border-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .login-brand-name {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-dark);
        }

        .login-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-dark);
            margin-bottom: var(--spacing-sm);
        }

        .login-subtitle {
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
            margin-bottom: var(--spacing-2xl);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-700);
            margin-bottom: var(--spacing-sm);
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 1px solid var(--color-gray-300);
            border-radius: var(--border-radius-lg);
            font-size: var(--font-size-base);
            font-family: var(--font-family-base);
            transition: all var(--transition);
            background-color: var(--color-white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-lighter);
        }

        .form-input::placeholder {
            color: var(--color-gray-400);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            font-size: var(--font-size-sm);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .checkbox-wrapper input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .checkbox-wrapper label {
            cursor: pointer;
            color: var(--color-gray-700);
        }

        .forgot-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-semibold);
        }

        .forgot-link:hover {
            color: var(--color-primary-light);
        }

        .login-button {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: var(--border-radius-lg);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
            margin-bottom: var(--spacing-lg);
        }

        .login-button:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin-bottom: var(--spacing-lg);
            font-size: var(--font-size-sm);
            color: var(--color-gray-500);
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 45%;
            height: 1px;
            background-color: var(--color-gray-300);
            vertical-align: middle;
        }

        .divider::before {
            margin-right: var(--spacing-md);
        }

        .divider::after {
            margin-left: var(--spacing-md);
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .social-button {
            padding: var(--spacing-md);
            border: 1px solid var(--color-gray-300);
            background-color: var(--color-white);
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-700);
            transition: all var(--transition);
        }

        .social-button:hover {
            background-color: var(--color-gray-100);
            border-color: var(--color-gray-400);
        }

        .signup-link {
            text-align: center;
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
        }

        .signup-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-semibold);
        }

        .signup-link a:hover {
            color: var(--color-primary-light);
        }

        @media (max-width: 768px) {
            .login-wrapper {
                grid-template-columns: 1fr;
            }

            .login-image {
                display: none;
            }

            .login-form-wrapper {
                padding: var(--spacing-lg);
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-image">
            📈
        </div>

        <div class="login-form-wrapper">
            <div class="login-form-container">
                <div class="login-brand">
                    <div class="login-logo-icon">inv</div>
                    <div class="login-brand-name">Inversiones</div>
                </div>

                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Please sign in to continue</p>

                <form>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" placeholder="cristina@example.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="••••••••" required>
                    </div>

                    <div class="form-options">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#forgot" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-button">Sign In</button>
                </form>

                <div class="divider">OR</div>

                <div class="social-login">
                    <button class="social-button">Google</button>
                    <button class="social-button">Github</button>
                </div>

                <div class="signup-link">
                    Don't have Account? <a href="#signup">Create account</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
