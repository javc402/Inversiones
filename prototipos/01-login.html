<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inversiones | Sistema de Trading</title>
    <link rel="stylesheet" href="assets/css/paleta.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c3a7f 0%, #1565c0 50%, #2196f3 100%);
        }

        .login-container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 400px;
            width: 90%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            font-size: 40px;
            font-weight: bold;
            color: var(--color-primary);
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 24px;
            font-weight: bold;
            color: var(--color-dark);
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--color-gray-600);
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-form .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-gray-600);
        }

        .login-footer a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 14px;
            color: var(--color-gray-700);
        }

        @media (max-width: 640px) {
            .login-container {
                padding: 32px 20px;
            }

            .login-logo {
                font-size: 32px;
            }

            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">📈</div>
                <div class="login-title">Inversiones</div>
                <div class="login-subtitle">Sistema de Gestión de Trading</div>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-input" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Recuérdame</label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg">
                    Iniciar Sesión
                </button>

                <button type="button" class="btn btn-secondary btn-lg">
                    Crear Cuenta
                </button>
            </form>

            <div class="login-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>
</body>
</html>
