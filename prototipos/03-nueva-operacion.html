<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Operación - Inversiones</title>
    <link rel="stylesheet" href="assets/css/paleta.css">
    <style>
        body {
            background-color: var(--color-gray-100);
        }

        .header {
            background: var(--gradient-primary);
            color: white;
            padding: var(--spacing-lg) var(--spacing-2xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--spacing-2xl);
        }

        .header-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 var(--spacing-lg) var(--spacing-2xl);
        }

        .form-card {
            background: var(--color-white);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .form-section {
            padding: var(--spacing-2xl);
            border-bottom: 1px solid var(--color-gray-200);
        }

        .form-section:last-child {
            border-bottom: none;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .section-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--gradient-primary);
            color: white;
            border-radius: 50%;
            font-weight: var(--font-weight-bold);
            font-size: var(--font-size-sm);
        }

        .section-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-dark);
            margin: 0;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-700);
            display: block;
            margin-bottom: var(--spacing-sm);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: var(--font-size-base);
            border: 1px solid var(--color-gray-300);
            border-radius: var(--border-radius-lg);
            font-family: var(--font-family-base);
            transition: all var(--transition);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-lighter);
        }

        .form-textarea {
            grid-column: 1 / -1;
            resize: vertical;
            min-height: 100px;
        }

        .info-alert {
            background: var(--color-info-lighter);
            border-left: 4px solid var(--color-info);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius-lg);
            margin-bottom: var(--spacing-2xl);
            color: var(--color-info);
            font-size: var(--font-size-sm);
            line-height: var(--line-height-relaxed);
        }

        .form-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            padding: var(--spacing-2xl);
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-top: 1px solid var(--color-gray-200);
        }

        .btn {
            padding: var(--spacing-md) var(--spacing-2xl);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            border: none;
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            transition: all var(--transition);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: var(--color-gray-200);
            color: var(--color-dark);
        }

        .btn-secondary:hover {
            background-color: var(--color-gray-300);
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }

            .form-section {
                padding: var(--spacing-lg);
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="header-title">Nueva Operación</h1>
    </div>

    <div class="container">
        <div class="info-alert">
            ℹ️ Complete todos los campos del formulario. Los cálculos como Duración y algunos análisis se completarán automáticamente.
        </div>

        <form class="form-card">
            <!-- Sección 1: Información Temporal -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-number">1</div>
                    <h2 class="section-title">Información Temporal</h2>
                </div>
                <div class="form-group">
                    <div>
                        <label class="form-label">Fecha</label>
                        <input type="date" class="form-input" value="2026-06-23">
                    </div>
                    <div>
                        <label class="form-label">Semana del Mes</label>
                        <select class="form-select">
                            <option>Seleccionar...</option>
                            <option>1ra Semana</option>
                            <option>2da Semana</option>
                            <option>3ra Semana</option>
                            <option>4ta Semana</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <div>
                        <label class="form-label">Hora de Entrada</label>
                        <input type="time" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Hora de Salida</label>
                        <input type="time" class="form-input">
                    </div>
                </div>
            </div>

            <!-- Sección 2: Información de la Operación -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-number">2</div>
                    <h2 class="section-title">Información de la Operación</h2>
                </div>
                <div class="form-group">
                    <div>
                        <label class="form-label">Par de Divisa</label>
                        <input type="text" class="form-input" placeholder="ej: EURUSD">
                    </div>
                    <div>
                        <label class="form-label">Tipo</label>
                        <select class="form-select">
                            <option>Seleccionar...</option>
                            <option>Vela Envolvente</option>
                            <option>PRE-POST</option>
                            <option>Modelo</option>
                            <option>Otro</option>
                        </select>
                    </div>
                </div>
                <div class="form-group full">
                    <label class="form-label">Noticia / Evento (Opcional)</label>
                    <input type="text" class="form-input" placeholder="ej: Reporte de empleos">
                </div>
            </div>

            <!-- Sección 3: Análisis Técnico -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-number">3</div>
                    <h2 class="section-title">Análisis Técnico</h2>
                </div>
                <div class="form-group">
                    <div>
                        <label class="form-label">Protocolo / Patrón</label>
                        <input type="text" class="form-input" placeholder="ej: Protocolo Vela Envolvente">
                    </div>
                    <div>
                        <label class="form-label">Modelo</label>
                        <input type="text" class="form-input" placeholder="ej: Modelo A">
                    </div>
                </div>
                <div class="form-group">
                    <div>
                        <label class="form-label">RR Ratio (1:X)</label>
                        <input type="number" class="form-input" placeholder="ej: 2.5">
                    </div>
                    <div>
                        <label class="form-label">Drawdown (%)</label>
                        <input type="number" class="form-input" placeholder="ej: 5.2">
                    </div>
                </div>
            </div>

            <!-- Sección 4: Resultado -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-number">4</div>
                    <h2 class="section-title">Resultado de la Operación</h2>
                </div>
                <div class="form-group">
                    <div>
                        <label class="form-label">Estado</label>
                        <select class="form-select">
                            <option>Seleccionar...</option>
                            <option>✅ Ganancia</option>
                            <option>❌ Pérdida</option>
                            <option>➡️ Break Even</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Monto USD</label>
                        <input type="number" class="form-input" placeholder="ej: 250.00">
                    </div>
                </div>
                <div class="form-group full">
                    <label class="form-label">Notas (Opcional)</label>
                    <textarea class="form-textarea" placeholder="Anota lo que consideres importante..."></textarea>
                </div>
            </div>

            <!-- Sección 5: Referencias -->
            <div class="form-section">
                <div class="section-header">
                    <div class="section-number">5</div>
                    <h2 class="section-title">Referencias</h2>
                </div>
                <div class="form-group full">
                    <label class="form-label">Link Chart M5</label>
                    <input type="url" class="form-input" placeholder="https://...">
                </div>
            </div>

            <!-- Acciones -->
            <div class="form-actions">
                <button type="reset" class="btn btn-secondary">Limpiar</button>
                <button type="submit" class="btn btn-primary">Guardar Operación</button>
            </div>
        </form>
    </div>
</body>
</html>
